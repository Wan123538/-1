<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸运抽奖</title>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a3e 0%, #2d1b4e 100%);
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: #f4d03f;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(244,208,63,0.5);
        }
        
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        textarea {
            width: 100%;
            height: 150px;
            background: rgba(0,0,0,0.3);
            border: 2px solid #f4d03f;
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 1rem;
            resize: vertical;
        }
        
        textarea:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(244,208,63,0.5);
        }
        
        .config {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
        }
        
        .count-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(244,208,63,0.2);
            border: 2px solid #f4d03f;
            color: #f4d03f;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .count-btn:hover {
            background: #f4d03f;
            color: #1a1a3e;
        }
        
        .count-display {
            font-size: 2.5rem;
            font-weight: bold;
            color: #f4d03f;
            min-width: 60px;
            text-align: center;
        }
        
        .lottery-btn {
            width: 100%;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #f4d03f, #e6b800);
            border: none;
            border-radius: 25px;
            color: #1a1a3e;
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(244,208,63,0.4);
        }
        
        .lottery-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(244,208,63,0.6);
        }
        
        .result-card {
            background: linear-gradient(135deg, rgba(244,208,63,0.3), rgba(224,86,253,0.2));
            border: 2px solid #f4d03f;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .result-badge {
            background: #f4d03f;
            color: #1a1a3e;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 10px;
            display: inline-block;
        }
        
        .result-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
        }
        
        .action-btns {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .action-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #f4d03f;
            background: transparent;
            color: #f4d03f;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .action-btn:hover {
            background: #f4d03f;
            color: #1a1a3e;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #f4d03f;
            color: #1a1a3e;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            transform: translateX(400px);
            transition: transform 0.4s;
            z-index: 1000;
        }
        
        .notification.show {
            transform: translateX(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ 幸运抽奖 ✨</h1>
        
        <div class="card">
            <h3>📝 输入抽奖名单</h3>
            <textarea id="namesInput" placeholder="每行输入一个名字&#10;&#10;示例：&#10;张三&#10;李四&#10;王五">张三
李四
王五
赵六
钱七
孙八
周九
吴十</textarea>
            <div style="margin-top: 10px; color: #f4d03f;">已输入 <span id="count">0</span> 个选项</div>
        </div>
        
        <div class="card">
            <h3>⚙️ 抽取人数</h3>
            <div class="config">
                <button class="count-btn" onclick="changeCount(-1)">−</button>
                <span class="count-display" id="countDisplay">1</span>
                <button class="count-btn" onclick="changeCount(1)">+</button>
            </div>
        </div>
        
        <button class="lottery-btn" onclick="startLottery()">🎰 开始抽奖</button>
        
        <div class="card" id="resultsCard" style="display: none;">
            <h3>🏆 中奖名单</h3>
            <div id="results"></div>
            <div class="action-btns">
                <button class="action-btn" onclick="startLottery()">🔄 重新抽取</button>
                <button class="action-btn" onclick="copyResults()">📋 复制结果</button>
                <button class="action-btn" onclick="reset()">🗑️ 重置</button>
            </div>
        </div>
    </div>
    
    <div class="notification" id="notification"></div>
    
    <script>
        let count = 1;
        let winners = [];
        
        function updateCount() {
            const names = document.getElementById('namesInput').value;
            const lines = names.split('\n').filter(line => line.trim().length > 0);
            document.getElementById('count').textContent = lines.length;
        }
        
        function changeCount(delta) {
            const names = document.getElementById('namesInput').value;
            const lines = names.split('\n').filter(line => line.trim().length > 0);
            count = Math.max(1, Math.min(lines.length, count + delta));
            document.getElementById('countDisplay').textContent = count;
        }
        
        function shuffle(arr) {
            const shuffled = [...arr];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }
        
        function showNotify(msg) {
            const notify = document.getElementById('notification');
            notify.textContent = msg;
            notify.classList.add('show');
            setTimeout(() => notify.classList.remove('show'), 3000);
        }
        
        function startLottery() {
            const names = document.getElementById('namesInput').value;
            const lines = names.split('\n').filter(line => line.trim().length > 0);
            
            if (lines.length === 0) {
                showNotify('请输入抽奖名单');
                return;
            }
            
            if (lines.length < count) {
                showNotify('人数不足，请添加更多名字');
                return;
            }
            
            const shuffled = shuffle(lines);
            winners = shuffled.slice(0, count);
            
            const resultsCard = document.getElementById('resultsCard');
            const resultsDiv = document.getElementById('results');
            
            resultsDiv.innerHTML = '';
            resultsCard.style.display = 'block';
            
            winners.forEach((winner, idx) => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <div class="result-badge">${idx === 0 ? '🥇 一等奖' : `第 ${idx + 1} 名`}</div>
                    <div class="result-name">${winner}</div>
                `;
                resultsDiv.appendChild(card);
            });
            
            showNotify(`恭喜 ${winners.length} 位幸运儿！`);
        }
        
        function copyResults() {
            const text = winners.map((w, i) => `${i + 1}. ${w}`).join('\n');
            navigator.clipboard.writeText(text).then(() => showNotify('已复制到剪贴板'));
        }
        
        function reset() {
            document.getElementById('namesInput').value = '';
            count = 1;
            document.getElementById('countDisplay').textContent = '1';
            updateCount();
            document.getElementById('resultsCard').style.display = 'none';
            winners = [];
        }
        
        document.getElementById('namesInput').addEventListener('input', updateCount);
        updateCount();
    </script>
</body>
</html>
